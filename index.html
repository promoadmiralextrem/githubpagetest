<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Carrusel de imágenes</title>

<style>
body,html{
margin:0;
padding:0;
width:100%;
height:100%;
background:#001c4c;
overflow:hidden;
}

/* slides */

.slide{
position:fixed;
top:0;
left:0;
width:100%;
height:100%;
object-fit:cover;
opacity:0;
transition:opacity 1s;
}

.active{
opacity:1;
}
</style>
</head>

<body>

<div id="slides"></div>

<script>

const slidesContainer = document.getElementById("slides")
let slides = []
let index = 0
const tiempo = 5000
const limite = 10

function cambiarSlide(){
if(slides.length === 0) return

slides[index].classList.remove("active")
index = (index + 1) % slides.length
slides[index].classList.add("active")
}

setInterval(cambiarSlide, tiempo)

let i = 1

function cargarImagen(){

if(i > limite) return

const img = new Image()
img.src = i + ".jpg"
img.className = "slide"

img.onload = function(){

slidesContainer.appendChild(img)
slides = document.querySelectorAll(".slide")

if(slides.length === 1){
slides[0].classList.add("active")
}

i++
cargarImagen()
}

img.onerror = function(){
i++
cargarImagen()
}
}

cargarImagen()

</script>

</body>
</html>
