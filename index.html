<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Banner + Slideshow Integrado</title>

<link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@800&display=swap" rel="stylesheet">

<style>
body, html{
    margin:0;
    padding:0;
    width:100%;
    height:100%;
    overflow:hidden;
    background:#000814;
    font-family: 'Montserrat', 'Poppins', 'Arial', sans-serif;
}

.slide{
    position:absolute;
    top:0;
    left:0;
    width:100%;
    height:100%;
    opacity:0;
}

.banner{
    width:100%;
    height:100%;
    display:flex;
    justify-content:center;
    align-items:center;
    flex-direction:column;
    background: radial-gradient(circle at center, #123a78 0%, #081f3f 60%, #000814 100%);
}

.admiral{
    font-size: clamp(60px, 12vw, 180px);
    font-weight: 800;
    letter-spacing:0.5vw;
    color:white;
}
.admiral span:first-child,
.admiral span:last-child{
    font-size:1.15em;
    transform: translateY(-0.1em);
}

.bet{
    margin-top:3vh;
}
.bet span{
    display:inline-block;
    font-size: clamp(40px, 8vw, 120px);
    font-weight:800;
    padding:1.5vh 3vw;
    margin:1vw;
    border-radius:1vw;
    background:#ffd100;
    color:#0b2d5c;
    animation:bounce 1.2s infinite ease-in-out;
}
.bet span:nth-child(2){ animation-delay:0.15s; }
.bet span:nth-child(3){ animation-delay:0.30s; }

.promo-container{
    margin-top:3vh;
}
.promo{
    font-weight:800;
    color:white;
    font-size: clamp(40px, 10vw, 140px);
}
.promo span{
    opacity:0;
    transform:translateY(20px);
    animation:build 4s infinite;
}
.promo span:nth-child(1){ animation-delay:0s; }
.promo span:nth-child(2){ animation-delay:0.8s; }
.promo span:nth-child(3){ animation-delay:1.6s; }

.slide img{
    width:100%;
    height:100%;
    object-fit:cover;
}

@keyframes bounce{
0%,100%{ transform:translateY(0);}
50%{ transform:translateY(-20px);}
}

@keyframes build{
0%{opacity:0; transform:translateY(20px);}
15%{opacity:1; transform:translateY(0);}
55%{opacity:1;}
100%{opacity:0; transform:translateY(-10px);}
}

.active{
opacity:1;
transition:opacity 1s;
}
</style>
</head>

<body>

<div class="slide banner active">
    <div class="admiral"><span>A</span>DMIRA<span>L</span></div>
    <div class="bet">
        <span>B</span><span>E</span><span>T</span>
    </div>
    <div class="promo-container">
        <div class="promo"><span>PRO</span><span>MO</span><span>CIONES</span></div>
    </div>
</div>

<div id="slides"></div>

<script>

const slidesContainer = document.getElementById("slides");
let slides = document.querySelectorAll(".slide");

let index = 0;
const tiempo = 15000; // 15 segundos

function cambiarSlide(){
    slides[index].classList.remove("active");
    index = (index + 1) % slides.length;
    slides[index].classList.add("active");
}

setInterval(cambiarSlide, tiempo);

/* Cargar imágenes automáticamente */
let i = 1;

function cargarImagen(){
    const img = new Image();
    /*img.src = i + ".jpg";*/
    img.src = i + ".jpg?v=" + Date.now();

    img.onload = function(){

        const div = document.createElement("div");
        div.className = "slide";

        const image = document.createElement("img");
        image.src = img.src;

        div.appendChild(image);
        slidesContainer.appendChild(div);

        slides = document.querySelectorAll(".slide");

        i++;
        cargarImagen();
    }
}

cargarImagen();

</script>

</body>

</html>
